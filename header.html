          <div class="d-flex align-items-center my-0 my-lg-0 me-lg-auto text-decoration-none">
			<form name="list_form" id="list_form" action="/" method="GET">

                <input name="pg" type="hidden" value="1" id="input_pg" />
				<input name="nn" type="hidden" value="{{ nn }}" id="input_nn" />
				<input name="sk" type="hidden" value="{{ sk }}" id="input_sk" />
				<input name="so" type="hidden" value="{{ so }}" id="input_so" />
				<input name="export" type="hidden" value="0" id="input_export" />

                <div class="container-fluid">

                <div class="row">
                    <div class="col-1">
				  <label class="pr-2">Search &nbsp; &nbsp; </label>
                        </div>
                    <div class="col-6">
				  <input type="text" class="form-control form-control-sm" name="search" id="input_search" value="{{ search_str }}">
                        </div>
                    <div class="col-1">
				  <label class="pr-2">From &nbsp; </label>
                        </div>
                    <div class="col-3">
				  <input type="text" class="form-control form-control-sm" name="time_min" id="input_time_min" value="{{ time_min }}">
                        </div>
                </div>

                <div class="row">
                    <div class="col-1">
                  <label class="pr-2">Filter &nbsp; </label>
                        </div>
                    <div class="col-6">
				  <input type="text" class="form-control form-control-sm" name="filter" id="input_filter" value="{{ filter_str }}">
                        </div>
                    <div class="col-1">
				  <label class="pr-2">To &nbsp; </label>
                        </div>
                    <div class="col-3">
				  <input type="text" class="form-control form-control-sm" name="time_max" id="input_time_max" value="{{ time_max }}">
                        </div>
                    <div class="col-1">
				  <button type="button" class="btn btn-primary btn-sm" onclick="javascript:submit_search_form();">Go</button>
                        </div>
                </div>

                </div><!-- conainter fluid -->

			</form> <!-- list form -->
            </div>
