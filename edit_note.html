<div class="container-fluid">

    <div class="row my-2 py-2">
        <div class="col">
        <p style="text-align: center;">
        Font:
        <a href="javascript:textarea_mono();">mono</a> |
        <a href="javascript:textarea_sans();">sans</a> |
        <a href="javascript:textarea_serif();">serif</a>
        &nbsp; &nbsp; &nbsp;
        Image pane: <a href="javascript:image_edit_frame_show();">show</a> | <a href="javascript:image_edit_frame_hide();">hide</a>
        &nbsp; &nbsp; &nbsp;
        <input class="form-check-input" type="checkbox" id="autosave_check" checked>
        <label class="form-check-label" for="autosave_check">Auto-Save</label>
        </p>
        </div>
    </div>

    <div class="row my-2 py-2">
        <div class="col-4"></div>
        <div class="col-4" id="people_autocomplete_div" style="display:none">
        <label>Name Search: </label>
        <input type="text" class="form-control form-control-sm" id="people_autocomplete_text_field" name="people_autocomplete_text_field">
        </div>
        <div class="col-4"></div>
    </div>

    <div class="row">

    <div class="col" id="edit_div">

        <form id="save_form" action="/save" method="POST" enctype="application/x-www-form-urlencoded">
        <input type="hidden" id="id" name="id" value="{{ id }}" />
        <input type="hidden" id="starting_hash" name="starting_hash" value="{{ starting_hash }}" />
        <textarea class="form-control form-control-sm flex-grow-1 txt_sans" style="height:500px" form="save_form" id="big_text" name="big_text">{{ note_body }}</textarea>
        </form>
        <button id="edit_form_save_btn" class="btn btn-primary" onclick="document.getElementById('save_form').submit();">Save</button>
        <button id="edit_form_cancel_btn"  class="btn" onclick="window.location.href='/cancel/{{ id }}';">Cancel</button>

    </div>

    <div class="col-4 col-lg-3 col-xl-3" style="display:none" id="ul_image_div">
        <iframe src="/image_edit_list/{{ id }}" title=""></iframe>
    </div>

    </div><!-- row -->

</div><!-- container-fluid -->
